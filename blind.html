<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="referrer" content="no-referrer"/>
  <title>盲测</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; padding: 16px 12px 100px; }

    .page-title { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
    .page-sub   { font-size: 12px; color: #555; margin-bottom: 20px; }
    .label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    hr { border: none; border-top: 1px solid #1a1a1a; margin: 16px 0; }

    /* avatars */
    .avatar-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
    .avatar-item {
      cursor: pointer; border-radius: 8px; overflow: hidden;
      border: 2px solid transparent; width: 64px; flex-shrink: 0;
      background: none; padding: 0;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    }
    .avatar-item.active { border-color: #fff; }
    .avatar-item img { width: 64px; height: 85px; object-fit: cover; display: block; background: #111; }
    .avatar-item .av-lbl { text-align: center; font-size: 10px; padding: 4px 2px; background: #111; color: #888; }

    /* model tabs */
    .tab-row { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 20px; }
    .pill {
      background: #1a1a1a; color: #999; border: 1px solid #2a2a2a;
      border-radius: 20px; padding: 6px 16px; font-size: 13px;
      cursor: pointer; white-space: nowrap;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    }
    .pill.active { background: #fff; color: #000; border-color: #fff; font-weight: 600; }

    /* template block */
    .tmpl-block { margin-bottom: 28px; }
    .tmpl-no { font-size: 12px; color: #555; margin-bottom: 8px; }

    /* scroll row */
    .versions-row {
      display: flex; gap: 8px; overflow-x: auto;
      padding-bottom: 4px; scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch; align-items: flex-start;
    }
    .versions-row::-webkit-scrollbar { height: 3px; }
    .versions-row::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    @media (max-width: 520px) { .versions-row { flex-wrap: wrap; overflow-x: visible; } }

    /* version card */
    .ver-card {
      background: #0d0d0d; border-radius: 8px; overflow: hidden;
      flex-shrink: 0; width: 220px; scroll-snap-align: start;
      border: 2px solid transparent; transition: border-color .15s;
    }
    @media (max-width: 520px) { .ver-card { width: calc(50% - 4px); } }
    .ver-card.best-picked { border-color: #4f4; }
    .ver-card img { width: 100%; height: auto; display: block; object-fit: contain; background: #151515; }
    .ver-lbl { text-align: center; font-size: 13px; font-weight: 700; color: #fff; padding: 6px 4px 3px; }

    /* scroll fade hint */
    .scroll-wrap { position: relative; }
    .scroll-fade {
      pointer-events: none; position: absolute; top: 0; right: 0; bottom: 4px;
      width: 48px;
      background: linear-gradient(to right, transparent, #000 90%);
      border-radius: 0 8px 8px 0;
      display: flex; align-items: center; justify-content: flex-end; padding-right: 6px;
    }
    .scroll-fade::after { content: '›'; font-size: 22px; color: #666; }
    .scroll-wrap.at-end .scroll-fade { display: none; }

    /* lightbox */
    #lb { display:none; position:fixed; inset:0; z-index:500; background:rgba(0,0,0,.93); align-items:center; justify-content:center; }
    #lb.open { display:flex; }
    #lb-img { max-width:92vw; max-height:88vh; object-fit:contain; border-radius:6px; }
    #lb-close { position:fixed; top:16px; right:20px; font-size:26px; color:#888; background:none; border:none; cursor:pointer; }
    #lb-close:hover { color:#fff; }

    /* best bar (above images) */
    .best-bar {
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      background: #111; border: 1.5px solid #333; border-radius: 10px;
      padding: 10px 14px; margin-bottom: 10px;
    }
    .best-bar-q {
      font-size: 14px; font-weight: 700; color: #fff; white-space: nowrap;
    }
    .best-btns { display: flex; gap: 6px; flex-wrap: wrap; }
    .best-btn {
      background: #222; color: #aaa; border: 1.5px solid #444;
      border-radius: 8px; padding: 8px 18px; font-size: 15px; font-weight: 700;
      cursor: pointer; min-width: 48px; text-align: center;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
      transition: background .1s, color .1s;
    }
    .best-btn.voted { background: #1a3a1a; color: #4f4; border-color: #4f4; }

    /* submit bar */
    .submit-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
      background: #111; border-top: 1px solid #222;
      padding: 12px 16px; display: flex; gap: 10px; align-items: center;
    }
    .name-input {
      flex: 1; background: #1a1a1a; color: #fff; border: 1px solid #333;
      border-radius: 8px; padding: 10px 12px; font-size: 14px;
      outline: none; min-width: 0;
    }
    .name-input::placeholder { color: #555; }
    .name-input:focus { border-color: #666; }
    .submit-btn {
      background: #fff; color: #000; border: none; border-radius: 8px;
      padding: 10px 20px; font-size: 14px; font-weight: 700;
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
      touch-action: manipulation;
    }
    .submit-btn:disabled { background: #333; color: #666; cursor: not-allowed; }
    .submit-btn.loading { background: #444; color: #aaa; }

    /* toast */
    .toast {
      position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
      background: #1a2a1a; color: #4f4; border: 1px solid #3a5a3a;
      border-radius: 10px; padding: 12px 24px; font-size: 14px; font-weight: 600;
      white-space: pre-line; text-align: center; max-width: 90vw;
      z-index: 300; opacity: 0; transition: opacity .3s; pointer-events: none;
    }
    .toast.show { opacity: 1; }
    .toast.err { background: #2a1a1a; color: #f55; border-color: #5a3a3a; }

    .empty { color: #444; font-size: 12px; padding: 20px 0; }
  </style>
</head>

-823oe-mp7sxkna7oy77f"]}, "模版图": {"模版图": ["https://mms.img.susercontent.com/sg-11134253-823oe-mp7xhdho5lhr62", "https://mms.img.susercontent.com/sg-11134253-823q5-mp7x1gks3bbj43", "https://mms.img.susercontent.com/sg-11134253-823q3-mp7wrz1uj30g78", "https://mms.img.susercontent.com/sg-11134253-823q7-mp7wtn97tqtnb2", "https://mms.img.susercontent.com/sg-11134253-823r3-mp7wvh2totfk72", "https://mms.img.susercontent.com/sg-11134253-823q8-mp7wvuhawmj3e4", "https://mms.img.susercontent.com/sg-11134253-823py-mp7wvj0f553i15", "https://mms.img.susercontent.com/sg-11134253-823p5-mp7wx0zehmvjd6", "https://mms.img.susercontent.com/sg-11134253-823p2-mp7wx4o8s83z22", "https://mms.img.susercontent.com/sg-11134253-823pw-mp7wxhj1dxj4bb"], "模版图2": ["https://mms.img.susercontent.com/sg-11134253-823p2-mp7x5wfdclcd7a", "https://mms.img.susercontent.com/sg-11134253-823on-mp7vzatxegi73d", "https://mms.img.susercontent.com/sg-11134253-823rp-mp7w10movoxt02", "https://mms.img.susercontent.com/sg-11134253-823pe-mp7w0pulxrsw2f", "https://mms.img.susercontent.com/sg-11134253-823or-mp7w2lrr9r0r34", "https://mms.img.susercontent.com/sg-11134253-823pi-mp7w19kb4wek56", "https://mms.img.susercontent.com/sg-11134253-823od-mp7w2r6d5de766", "https://mms.img.susercontent.com/sg-11134253-823qi-mp7w2x9vwjy9e7", "https://mms.img.susercontent.com/sg-11134253-823os-mp7w2xk3nifj59", "https://mms.img.susercontent.com/sg-11134253-823qr-mp7w6b2ef2f69b"]}}}};
const LABELS = ['A','B','C','D','E','F','G','H'];

const MODEL_MAP = {
  '商品图': '商品图',
  '模版图': '模版图',
};
const SHOW_MODELS = Object.keys(MODEL_MAP).filter(k => D.models.includes(k));

const S = { avatarIdx: 0, template: SHOW_MODELS[0] };

function getBranches(ai, t) {
  return Object.keys((D.data[ai]&&D.data[ai][t])||{});
}
function getImages(ai,t,b) {
  return (D.data[ai]&&D.data[ai][t]&&D.data[ai][t][b])||[];
}

// ── Votes (local cache) ──
function getVotes() { try { return JSON.parse(localStorage.getItem('bv4')||'{}'); } catch { return {}; } }
function saveVotes(v) { localStorage.setItem('bv4', JSON.stringify(v)); }

function imgKey(ai,t,bi,ii,crit) { return [ai,t,bi,ii,crit].join('|'); }
function getIV(ai,t,bi,ii,crit) { return getVotes()[imgKey(ai,t,bi,ii,crit)]||{me:null}; }
function setIV(ai,t,bi,ii,crit,val) {
  const v=getVotes(), k=imgKey(ai,t,bi,ii,crit);
  v[k]={me:val}; saveVotes(v);
}
function bestKey(ai,t,ii) { return ['B',ai,t,ii].join('|'); }
function getBV(ai,t,ii) { return getVotes()[bestKey(ai,t,ii)]||{counts:{},me:[]}; }
function setBV(ai,t,ii,lbl) {
  const v=getVotes(), k=bestKey(ai,t,ii);
  const c=v[k]||{counts:{},me:[]};
  if(!Array.isArray(c.me)) c.me = c.me ? [c.me] : [];
  const idx=c.me.indexOf(lbl);
  if(idx>=0){ c.me.splice(idx,1); } // deselect
  else if(c.me.length<2){ c.me.push(lbl); } // select (max 2)
  v[k]=c; saveVotes(v);
}

// ── Render avatars ──
function renderAvatars() {
  const el=document.getElementById('avatarRow'); el.innerHTML='';
  D.avatars.forEach((url,i)=>{
    const btn=document.createElement('button');
    btn.className='avatar-item'+(i===S.avatarIdx?' active':'');
    btn.type='button';
    btn.innerHTML=`<img src="${url}" loading="lazy"/><div class="av-lbl">头像 ${i+1}</div>`;
    btn.addEventListener('click',()=>{ S.avatarIdx=i; renderAvatars(); renderMain(); });
    el.appendChild(btn);
  });
}

// ── Render model tabs ──
function renderTemplateTabs() {
  const el=document.getElementById('templateTabs');
  el.innerHTML=SHOW_MODELS.map(t=>
    `<button class="pill ${t===S.template?'active':''}" data-t="${t}" type="button">${MODEL_MAP[t]||t}</button>`
  ).join('');
  el.querySelectorAll('.pill').forEach(btn=>btn.addEventListener('click',()=>{
    S.template=btn.dataset.t; renderTemplateTabs(); renderMain();
  }));
}


// ── Render main ──
function renderMain() {
  const main=document.getElementById('main');
  const ai=S.avatarIdx;
  const branches=getBranches(ai,S.template);
  if(!branches.length){ main.innerHTML='<p class="empty">暂无数据</p>'; return; }
  const count=getImages(ai,S.template,branches[0]).length;
  if(!count){ main.innerHTML='<p class="empty">暂无图片数据</p>'; return; }

  let html='';
  for(let ii=0;ii<count;ii++){
    const bv=getBV(ai,S.template,ii);
    // build best-picker bar (placed BEFORE images)
    const visibleBranchesEarly=branches.filter(b=>!!getImages(ai,S.template,b)[ii]);
    const meArr=Array.isArray(bv.me)?bv.me:(bv.me?[bv.me]:[]);
    const bestBtnsEarly=visibleBranchesEarly.map((_,i2)=>{const l=LABELS[i2]||String(i2+1);return`<button class="best-btn ${meArr.includes(l)?'voted':''}" data-lbl="${l}" data-ii="${ii}" type="button">${l}</button>`;}).join('');
    const bestBarHtml=`<div class="best-bar" data-ii="${ii}">
      <span class="best-bar-q">选最优（最多选两个）${meArr.length ? `&nbsp;&nbsp;✅ 已选：${meArr.join('、')}` : ''}</span>
      <div class="best-btns">${bestBtnsEarly}</div>
    </div>`;
    html+=`<div class="tmpl-block"><div class="tmpl-no">模板 ${ii+1} · <span style="color:#aaa;font-weight:400">${(D.styles[String(ai)]||[])[ii]||''}</span></div>${bestBarHtml}<div class="scroll-wrap"><div class="scroll-fade"></div><div class="versions-row" data-ii="${ii}">`;
    branches.forEach((branch,bi)=>{
      const url=getImages(ai,S.template,branch)[ii]||'';
      if(!url) return;
      const lbl=LABELS[bi]||String(bi+1);

      const meArr2=Array.isArray(bv.me)?bv.me:(bv.me?[bv.me]:[]);
      html+=`<div class="ver-card ${meArr2.includes(lbl)?'best-picked':''}" data-bi="${bi}" data-ii="${ii}">
        <img src="${url}" loading="lazy" style="cursor:zoom-in" onclick="lbOpen('${url}')"/>
        <div class="ver-lbl">版本 ${lbl}</div>
      </div>`;
    });

    html+=`</div></div></div>`;
  }
  main.innerHTML=html;


  main.querySelectorAll('.best-btn').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      setBV(ai,S.template,+btn.dataset.ii,btn.dataset.lbl);
      renderMain();
    });
  });

  // scroll fade: hide arrow when scrolled to end
  main.querySelectorAll('.versions-row').forEach(row=>{
    const wrap = row.closest('.scroll-wrap');
    const update = () => {
      const atEnd = row.scrollLeft + row.clientWidth >= row.scrollWidth - 8;
      wrap.classList.toggle('at-end', atEnd);
    };
    row.addEventListener('scroll', update, {passive:true});
    update();
  });
}

// ── Lightbox ──
function lbOpen(url) {
  document.getElementById('lb-img').src = url;
  document.getElementById('lb').classList.add('open');
}
document.getElementById('lb').addEventListener('click', e=>{
  if(e.target === document.getElementById('lb')) document.getElementById('lb').classList.remove('open');
});
document.addEventListener('keydown', e=>{ if(e.key==='Escape') document.getElementById('lb').classList.remove('open'); });

// ── Toast ──
function showToast(msg, isErr, duration=3000) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show'+(isErr?' err':'');
  setTimeout(()=>t.className='toast', duration);
}

// ── Submit ──
document.getElementById('submitBtn').addEventListener('click', async ()=>{
  const name=document.getElementById('nameInput').value.trim();
  if(!name){ showToast('请先输入你的名字',true); return; }

  // ── Validate: every avatar × template × row must have a best pick ──
  const missing=[];
  D.avatars.forEach((_,ai)=>{
    SHOW_MODELS.forEach(tmpl=>{
      const branches=getBranches(ai,tmpl);
      const count=branches.length?(getImages(ai,tmpl,branches[0]).length):0;
      for(let ii=0;ii<count;ii++){
        const bv=getBV(ai,tmpl,ii);
        const meArr=Array.isArray(bv.me)?bv.me:(bv.me?[bv.me]:[]);
        if(!meArr.length) missing.push(`头像${ai+1} · ${MODEL_MAP[tmpl]||tmpl} · 模板${ii+1}`);
      }
    });
  });
  if(missing.length){
    const first=missing[0];
    showToast(`⚠️ 还有 ${missing.length} 处未完成评测，请补全后再提交\n（第一处：${first}）`, true, 5000);
    return;
  }

  const v=getVotes();
  const rows=[];
  const now=new Date().toLocaleString('zh-CN',{timeZone:'Asia/Shanghai'});

  D.avatars.forEach((_,ai)=>{
    SHOW_MODELS.forEach(tmpl=>{
      const branches=getBranches(ai,tmpl);
      const count=branches.length?(getImages(ai,tmpl,branches[0]).length):0;
      for(let ii=0;ii<count;ii++){
        const bv=getBV(ai,tmpl,ii);
        branches.forEach((branch,bi)=>{
          const lbl=LABELS[bi]||String(bi+1);
          rows.push({
            time: now, name, avatar: `头像${ai+1}`,
            model: MODEL_MAP[tmpl]||tmpl, template_no: ii+1,
            style: (D.styles[String(ai)]||[])[ii]||'',
            version_label: lbl, actual_branch: branch,
            is_best: (Array.isArray(bv.me)?bv.me:(bv.me?[bv.me]:[])).includes(lbl) ? '是' : ''
          });
        });
      }
    });
  });


  const btn=document.getElementById('submitBtn');
  btn.disabled=true; btn.textContent='提交中...'; btn.classList.add('loading');

  fetch(SCRIPT_URL, {
    method:'POST',
    headers:{'Content-Type':'text/plain'},
    body: JSON.stringify({ name, rows })
  }).catch(()=>{});
  // Apps Script processes the request even if CORS blocks the response
  await new Promise(r=>setTimeout(r,1500));
  showToast('✓ 提交成功！');
  btn.textContent='已提交 ✓'; btn.style.background='#1a2a1a'; btn.style.color='#4f4';
});

renderAvatars(); renderTemplateTabs(); renderMain();
</script>
