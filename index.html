<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="referrer" content="no-referrer"/>
<title>Try-on 效果对比</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0a; color: #eee; font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; overflow-x: hidden; }

  /* ── header ── */
  .header { padding: 14px 16px 8px; border-bottom: 1px solid #1e1e1e; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 10; background: #0a0a0a; }
  .header h1 { font-size: 15px; font-weight: 700; color: #fff; }
  .refresh-btn { margin-left: auto; background: #1a1a1a; border: 1px solid #333; color: #888; border-radius: 6px; padding: 4px 10px; font-size: 12px; cursor: pointer; }
  .refresh-btn:hover { color: #4af; border-color: #4af; }

  /* ── avatar picker ── */
  .av-strip { display: flex; gap: 8px; overflow-x: auto; padding: 8px 16px; border-bottom: 1px solid #1a1a1a; scrollbar-width: none; }
  .av-strip::-webkit-scrollbar { display: none; }
  .av-btn { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; background: none; border: 2px solid transparent; border-radius: 10px; padding: 4px 6px; transition: border-color .15s; }
  .av-btn img { width: 52px; height: 52px; object-fit: cover; border-radius: 6px; background: #1a1a1a; }
  .av-btn span { font-size: 10px; color: #666; }
  .av-btn.active { border-color: #4af; }
  .av-btn.active span { color: #4af; }

  /* ── loading ── */
  #loading { padding: 40px; text-align: center; color: #555; font-size: 14px; }

  /* ── main scroll area ── */
  #main { width: 100%; }

  /* ── one row per outfit ── */
  .row-block { border-bottom: 1px solid #111; }
  .row-sticky { position: sticky; left: 0; z-index: 5; background: #0a0a0a; min-width: 90px; max-width: 90px; padding: 8px 8px 8px 16px; display: flex; flex-direction: column; justify-content: center; border-right: 1px solid #1a1a1a; flex-shrink: 0; }
  .row-num { font-size: 10px; color: #555; }
  .row-style { font-size: 11px; color: #aaa; font-weight: 600; word-break: break-word; line-height: 1.3; margin-top: 2px; }

  /* inner scroll container */
  .row-scroll { display: flex; overflow-x: auto; scrollbar-width: thin; scrollbar-color: #222 transparent; }
  .row-scroll::-webkit-scrollbar { height: 4px; }
  .row-scroll::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }

  .row-inner { display: flex; align-items: flex-start; }

  /* ── group divider ── */
  .grp-block { display: flex; flex-direction: column; }
  .grp-header { font-size: 10px; font-weight: 700; text-align: center; padding: 4px 6px; color: #fff; letter-spacing: .04em; white-space: nowrap; }
  .grp-header.t1 { background: #0d2233; color: #4af; }
  .grp-header.t2 { background: #1a1400; color: #fa4; }
  .grp-header.t3 { background: #0d1a0d; color: #4c4; }
  .grp-cols { display: flex; gap: 0; }

  /* ── single branch column ── */
  .branch-col { flex: 0 0 auto; width: var(--col-w, 170px); border-right: 1px solid #1a1a1a; }
  .branch-header { font-size: 9px; color: #888; text-align: center; padding: 3px 4px; background: #111; line-height: 1.3; min-height: 32px; display: flex; align-items: center; justify-content: center; word-break: break-word; }
  .phone-frame { width: 100%; aspect-ratio: 9/16; background: #111; border: none; overflow: hidden; }
  .phone-frame img { width: 100%; height: 100%; object-fit: cover; display: block; cursor: zoom-in; }
  .phone-frame .empty { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: #333; font-size: 12px; }

  /* ── vote panel ── */
  .vote-panel { border-top: 1px solid #1a1a1a; padding: 4px 4px 6px; }
  .crit-row { margin-bottom: 3px; }
  .crit-lbl { font-size: 8.5px; color: #555; display: block; margin-bottom: 2px; padding-left: 1px; }
  .crit-btns { display: flex; gap: 2px; }
  .vb { flex: 1; font-size: 8px; padding: 3px 1px; background: #111; border: 1px solid #222; color: #555; border-radius: 3px; cursor: pointer; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.2; }
  .vb.sel { background: #0d2a0d; color: #5d5; border-color: #2a4a2a; }
  .best-star { width: 100%; margin-top: 4px; font-size: 10px; padding: 4px 2px; background: #111; border: 1px solid #222; color: #555; border-radius: 4px; cursor: pointer; text-align: center; }
  .best-star.on { background: #2a2200; color: #fc4; border-color: #554400; }
  .branch-col.best-picked > .phone-frame { outline: 2px solid #fc4; outline-offset: -2px; }

  /* ── filter panel ── */
  #filter-bar { padding: 6px 16px 8px; border-bottom: 1px solid #1a1a1a; background: #0a0a0a; }
  .filter-toggle-btn { font-size: 11px; color: #888; background: none; border: none; cursor: pointer; padding: 2px 6px; }
  .filter-toggle-btn:hover { color: #ccc; }
  .filter-groups { display: flex; flex-wrap: wrap; gap: 10px 20px; margin-top: 4px; }
  .filter-group { display: flex; flex-direction: column; gap: 4px; }
  .fg-header { display: flex; align-items: center; gap: 6px; }
  .fg-label { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 3px; }
  .fg-label.t1 { background: #0d2233; color: #4af; }
  .fg-label.t2 { background: #1a1400; color: #fa4; }
  .fg-label.t3 { background: #0d1a0d; color: #4c4; }
  .fg-all-btn { font-size: 10px; color: #555; background: none; border: none; cursor: pointer; padding: 1px 4px; }
  .fg-all-btn:hover { color: #aaa; }
  .fg-branches { display: flex; flex-wrap: wrap; gap: 4px; }
  .fb-btn { font-size: 10px; padding: 3px 8px; border-radius: 12px; border: 1px solid #333; background: #111; color: #666; cursor: pointer; transition: all .12s; white-space: nowrap; }
  .fb-btn.on { border-color: #4af; background: #0d2233; color: #4af; }
  .fb-btn.on.t2 { border-color: #fa4; background: #1a1400; color: #fa4; }
  .fb-btn.on.t3 { border-color: #4c4; background: #0d1a0d; color: #4c4; }
  #filter-bar.collapsed .filter-groups { display: none; }

  /* ── lightbox ── */
  #lb { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,.92); align-items: center; justify-content: center; }
  #lb.open { display: flex; }
  #lb-img { max-width: 90vw; max-height: 90vh; object-fit: contain; border-radius: 4px; box-shadow: 0 8px 60px rgba(0,0,0,.8); }
  #lb-close { position: fixed; top: 18px; right: 22px; font-size: 28px; color: #aaa; cursor: pointer; line-height: 1; background: none; border: none; }
  #lb-close:hover { color: #fff; }
  #lb-caption { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); font-size: 12px; color: #888; white-space: nowrap; max-width: 90vw; overflow: hidden; text-overflow: ellipsis; }
  /* prev/next arrows */
  #lb-prev, #lb-next { position: fixed; top: 50%; transform: translateY(-50%); font-size: 32px; color: #666; cursor: pointer; background: none; border: none; padding: 0 16px; user-select: none; }
  #lb-prev { left: 4px; } #lb-next { right: 4px; }
  #lb-prev:hover, #lb-next:hover { color: #fff; }
</style>
</head>
<body>

<div class="header">
  <h1>Try-on 效果对比</h1>
  <button class="refresh-btn" onclick="loadData()">↺ 刷新数据</button>
</div>
<div class="av-strip" id="avStrip"></div>
<div id="filter-bar">
  <button class="filter-toggle-btn" onclick="toggleFilterBar()">▾ 版本筛选</button>
  <div class="filter-groups" id="filterGroups"></div>
</div>
<div id="loading">加载中…</div>
<div id="main"></div>

<!-- lightbox -->
<div id="lb">
  <button id="lb-close" onclick="lbClose()">✕</button>
  <button id="lb-prev"  onclick="lbStep(-1)">‹</button>
  <img id="lb-img" src="" alt=""/>
  <button id="lb-next"  onclick="lbStep(1)">›</button>
  <div id="lb-caption"></div>
</div>

let D = null;
let S = { ai: 0, activeBranches: new Set() };

/* ── filter bar ── */
function toggleFilterBar() {
  const bar = document.getElementById('filter-bar');
  bar.classList.toggle('collapsed');
  bar.querySelector('.filter-toggle-btn').textContent =
    bar.classList.contains('collapsed') ? '▸ 版本筛选' : '▾ 版本筛选';
}

function renderFilterBar() {
  const el = document.getElementById('filterGroups');
  el.innerHTML = '';
  for (const grp of D.grpOrder) {
    const cls = GRP_CLASS[grp] || 't1';
    const lbl = GRP_LABEL[grp] || grp;
    const branches = D.grpBranches[grp] || [];
    const div = document.createElement('div');
    div.className = 'filter-group';
    div.innerHTML = `<div class="fg-header">
      <span class="fg-label ${cls}">${lbl}</span>
      <button class="fg-all-btn" onclick="filterGroupAll('${grp}', true)">全选</button>
      <button class="fg-all-btn" onclick="filterGroupAll('${grp}', false)">全不选</button>
    </div>
    <div class="fg-branches" id="fg-${grp.replace(/[^a-z0-9]/gi,'_')}">
      ${branches.map(b => `<button class="fb-btn ${cls} ${S.activeBranches.has(b)?'on':''}" onclick="filterToggle('${b.replace(/'/g,"\\'")}', '${cls}')" data-branch="${b}">${b}</button>`).join('')}
    </div>`;
    el.appendChild(div);
  }
}

function filterToggle(branch, cls) {
  if (S.activeBranches.has(branch)) S.activeBranches.delete(branch);
  else S.activeBranches.add(branch);
  // update button state
  document.querySelectorAll(`.fb-btn[data-branch="${CSS.escape(branch)}"]`).forEach(btn => {
    btn.classList.toggle('on', S.activeBranches.has(branch));
  });
  renderMain();
}

function filterGroupAll(grp, on) {
  const branches = D.grpBranches[grp] || [];
  branches.forEach(b => { if (on) S.activeBranches.add(b); else S.activeBranches.delete(b); });
  renderFilterBar();
  renderMain();
}

/* ── render avatars ── */
function renderAvatars() {
  const el = document.getElementById('avStrip');
  el.innerHTML = '';
  D.avatarOrder.forEach((url, i) => {
    const btn = document.createElement('button');
    btn.className = 'av-btn' + (i === S.ai ? ' active' : '');
    btn.type = 'button';
    btn.innerHTML = `<img src="${url}" loading="lazy"/><span>头像 ${i+1}</span>`;
    btn.onclick = () => { S.ai = i; renderAvatars(); renderMain(); };
    el.appendChild(btn);
  });
}

/* ── render main grid ── */
function renderMain() {
  const main = document.getElementById('main');
  const ai = S.ai;
  const styles = D.styles[ai] || [];
  const aiData = D.data[ai] || {};

  // count rows from first available branch
  let rowCount = 0;
  outer: for (const grp of D.grpOrder) {
    for (const b of (D.grpBranches[grp] || [])) {
      rowCount = ((aiData[grp] || {})[b] || []).length;
      if (rowCount) break outer;
    }
  }
  if (!rowCount) { main.innerHTML = '<p style="color:#555;padding:20px">暂无数据</p>'; return; }

  // col width CSS var via style on main
  main.style.setProperty('--col-w', '170px');

  LB_IMGS = [];  // reset lightbox image list
  let html = '';
  for (let ii = 0; ii < rowCount; ii++) {
    html += `<div class="row-block">
      <div style="display:flex;align-items:stretch;">
        <div class="row-sticky">
          <div class="row-num">#${ii+1}</div>
          <div class="row-style">${styles[ii] || ''}</div>
        </div>
        <div class="row-scroll"><div class="row-inner">`;

    for (const grp of D.grpOrder) {
      const allBranches = D.grpBranches[grp] || [];
      const branches = allBranches.filter(b => S.activeBranches.has(b));
      if (!branches.length) continue;
      const cls = GRP_CLASS[grp] || 't1';
      const lbl = GRP_LABEL[grp] || grp;
      const totalW = branches.length * 170;
      html += `<div class="grp-block">
        <div class="grp-header ${cls}" style="width:${totalW}px">${lbl}</div>
        <div class="grp-cols">`;
      for (const branch of branches) {
        const url = ((aiData[grp] || {})[branch] || [])[ii] || '';
        const idx = LB_IMGS.length;
        if (url) LB_IMGS.push({ url, caption: `${branch}  ·  #${ii+1} ${styles[ii]||''}` });
        const best = getBest(ai, ii);
        const isBest = best.includes(branch);
        const bkeyAttr = ('bc\x01' + ai + '\x01' + ii + '\x01' + branch).replace(/&/g,'&amp;').replace(/"/g,'&quot;');
        html += `<div class="branch-col ${isBest?'best-picked':''}" data-bkey="${bkeyAttr}">
          <div class="branch-header">${branch}</div>
          <div class="phone-frame">
            ${url ? `<img src="${url}" loading="lazy" onclick="lbOpen(${idx})"/>` : '<div class="empty">—</div>'}
          </div>
          ${url ? votePanelHTML(ai, grp, branch, ii) : ''}
        </div>`;
      }
      html += `</div></div>`;
    }

    html += `</div></div></div></div>`;
  }

  main.innerHTML = html;
}

/* ── vote storage ── */
const CRITS = [
  { key:'f1', label:'人脸一致性',  opts:['非常一致','部分一致','完全不像'] },
  { key:'f2', label:'换脸自然度',  opts:['非常自然','一般','非常不自然'] },
  { key:'b1', label:'身材比例',    opts:['无明显问题','略有问题','问题明显'] },
  { key:'b2', label:'人像占比',    opts:['大','中等','小'] },
  { key:'g1', label:'Glance风格', opts:['非常符合','一般','不符合'] },
];
let VOTES = {};
try { VOTES = JSON.parse(localStorage.getItem('cv1') || '{}'); } catch(e) { VOTES = {}; }
function saveVotes() { try { localStorage.setItem('cv1', JSON.stringify(VOTES)); } catch(e){} }
function vKey(ai, grp, branch, ii, crit) { return [ai, grp, branch, ii, crit].join('\x01'); }
function bKey(ai, ii) { return 'B\x01' + ai + '\x01' + ii; }
function getVote(ai, grp, branch, ii, crit) { return VOTES[vKey(ai,grp,branch,ii,crit)] ?? null; }
function setVote(ai, grp, branch, ii, crit, choice) {
  VOTES[vKey(ai,grp,branch,ii,crit)] = choice;
  saveVotes();
}
function getBest(ai, ii) { return VOTES[bKey(ai,ii)] || []; }
function toggleBest(ai, ii, branch) {
  const k = bKey(ai, ii);
  let arr = VOTES[k] || [];
  const idx = arr.indexOf(branch);
  if (idx >= 0) arr.splice(idx, 1);
  else arr.push(branch);
  VOTES[k] = arr;
  saveVotes();
  // update DOM without full re-render
  const escaped = CSS.escape('bc\x01' + ai + '\x01' + ii + '\x01' + branch);
  const col = document.querySelector(`.branch-col[data-bkey="${CSS.escape('bc\x01' + ai + '\x01' + ii + '\x01' + branch)}"]`);
  if (col) {
    col.classList.toggle('best-picked', arr.includes(branch));
    const btn = col.querySelector('.best-star');
    if (btn) { btn.classList.toggle('on', arr.includes(branch)); btn.textContent = arr.includes(branch) ? '★ 已选最优' : '☆ 选为最优'; }
  }
}

function voteClick(ai, grp, branch, ii, crit, choice, btn) {
  const cur = getVote(ai, grp, branch, ii, crit);
  const newChoice = cur === choice ? null : choice;
  setVote(ai, grp, branch, ii, crit, newChoice);
  // update sibling buttons in same crit group
  const row = btn.closest('.crit-btns');
  row.querySelectorAll('.vb').forEach((b, j) => b.classList.toggle('sel', newChoice !== null && String(j) === newChoice));
}

function votePanelHTML(ai, grp, branch, ii) {
  const best = getBest(ai, ii);
  const isBest = best.includes(branch);
  const critsHtml = CRITS.map(c => {
    const cur = getVote(ai, grp, branch, ii, c.key);
    const btns = c.opts.map((opt, oi) =>
      `<button class="vb ${cur===String(oi)?'sel':''}" onclick="voteClick(${ai},'${grp.replace(/'/g,"\\'")}','${branch.replace(/'/g,"\\'")}',${ii},'${c.key}','${oi}',this)">${opt}</button>`
    ).join('');
    return `<div class="crit-row"><span class="crit-lbl">${c.label}</span><div class="crit-btns">${btns}</div></div>`;
  }).join('');
  const bkeyAttr = ('bc\x01' + ai + '\x01' + ii + '\x01' + branch).replace(/&/g,'&amp;').replace(/"/g,'&quot;');
  return `<div class="vote-panel">${critsHtml}<button class="best-star ${isBest?'on':''}" onclick="toggleBest(${ai},${ii},'${branch.replace(/'/g,"\\'")}')"> ${isBest?'★ 已选最优':'☆ 选为最优'}</button></div>`;
}

/* ── lightbox ── */
let LB_IMGS = [], LB_IDX = 0;

function lbOpen(idx) {
  LB_IDX = idx;
  lbShow();
  document.getElementById('lb').classList.add('open');
}
function lbClose() {
  document.getElementById('lb').classList.remove('open');
}
function lbShow() {
  const item = LB_IMGS[LB_IDX];
  if (!item) return;
  document.getElementById('lb-img').src = item.url;
  document.getElementById('lb-caption').textContent = item.caption;
}
function lbStep(d) {
  LB_IDX = (LB_IDX + d + LB_IMGS.length) % LB_IMGS.length;
  lbShow();
}
// keyboard nav
document.addEventListener('keydown', e => {
  if (!document.getElementById('lb').classList.contains('open')) return;
  if (e.key === 'Escape')      lbClose();
  else if (e.key === 'ArrowRight') lbStep(1);
  else if (e.key === 'ArrowLeft')  lbStep(-1);
});
// click backdrop to close
document.getElementById('lb').addEventListener('click', e => {
  if (e.target === document.getElementById('lb')) lbClose();
});

// Init directly from embedded CSV data
D = {
  avatarOrder: FALLBACK_D.avatarOrder,
  grpOrder:    FALLBACK_D.grpOrder,
  grpBranches: FALLBACK_D.grpBranches,
  styles: Object.fromEntries(Object.entries(FALLBACK_D.styles).map(([k,v])=>[Number(k),v])),
  data:   Object.fromEntries(Object.entries(FALLBACK_D.data).map(([k,v])=>[Number(k),v])),
};
// init activeBranches with all branches selected
for (const grp of D.grpOrder) {
  (D.grpBranches[grp] || []).forEach(b => S.activeBranches.add(b));
}
document.getElementById('loading').style.display = 'none';
renderAvatars();
renderFilterBar();
renderMain();
</script>
